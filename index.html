
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 1.5rem 0; flex-wrap: wrap; }
canvas { border: 0.5px solid var(--color-border-primary); border-radius: var(--border-radius-md); display: block; }
#side { display: flex; flex-direction: column; gap: 12px; min-width: 120px; }
.panel { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; }
.panel-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.panel-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
#next-canvas { display: block; }
#msg { text-align: center; font-size: 13px; color: var(--color-text-secondary); }
#btn { width: 100%; padding: 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; transition: background 0.15s; }
#btn:hover { background: var(--color-background-secondary); }
.keys { font-size: 11px; color: var(--color-text-tertiary); line-height: 1.8; }
</style>

<div id="app">
  <canvas id="board" width="200" height="400"></canvas>
  <div id="side">
    <div class="panel">
      <div class="panel-label">점수</div>
      <div class="panel-value" id="score">0</div>
    </div>
    <div class="panel">
      <div class="panel-label">레벨</div>
      <div class="panel-value" id="level">1</div>
    </div>
    <div class="panel">
      <div class="panel-label">줄</div>
      <div class="panel-value" id="lines">0</div>
    </div>
    <div class="panel">
      <div class="panel-label">다음</div>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
    <button id="btn">시작</button>
    <div id="msg">↑ 시작 버튼을 누르세요</div>
    <div class="keys">
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 빠르게<br>
      Space 즉시 낙하
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');
const COLS = 10, ROWS = 20, SZ = 20;

const PIECES = [
  { shape: [[1,1,1,1]], color: '#378ADD' },
  { shape: [[1,1],[1,1]], color: '#FAC775' },
  { shape: [[0,1,1],[1,1,0]], color: '#5DCAA5' },
  { shape: [[1,1,0],[0,1,1]], color: '#D85A30' },
  { shape: [[1,0,0],[1,1,1]], color: '#7F77DD' },
  { shape: [[0,0,1],[1,1,1]], color: '#D4537E' },
  { shape: [[0,1,0],[1,1,1]], color: '#97C459' },
];

let board, piece, next, score, level, lines, gameRunning, gameOver, dropTimer, dropInterval, animId;

function newBoard() { return Array.from({length: ROWS}, () => Array(COLS).fill(0)); }

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color,
    x: Math.floor(COLS / 2) - Math.floor(p.shape[0].length / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const r = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let i = 0; i < rows; i++)
    for (let j = 0; j < cols; j++)
      r[j][rows - 1 - i] = shape[i][j];
  return r;
}

function valid(sh, x, y) {
  for (let r = 0; r < sh.length; r++)
    for (let c = 0; c < sh[r].length; c++)
      if (sh[r][c]) {
        const nx = x + c, ny = y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function place() {
  for (let r = 0; r < piece.shape.length; r++)
    for (let c = 0; c < piece.shape[r].length; c++)
      if (piece.shape[r][c]) {
        const ny = piece.y + r;
        if (ny < 0) { endGame(); return; }
        board[ny][piece.x + c] = piece.color;
      }
  clearLines();
  piece = next;
  next = randomPiece();
  if (!valid(piece.shape, piece.x, piece.y)) { endGame(); return; }
  drawNext();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++; r++;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800][cleared] * level;
    score += pts;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 80);
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
  }
}

function drop() {
  if (!valid(piece.shape, piece.x, piece.y + 1)) place();
  else piece.y++;
}

function hardDrop() {
  while (valid(piece.shape, piece.x, piece.y + 1)) piece.y++;
  place();
}

function drawCell(c, x, y, sz, context) {
  context.fillStyle = c;
  context.fillRect(x * sz + 1, y * sz + 1, sz - 2, sz - 2);
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(x * sz + 1, y * sz + 1, sz - 2, 3);
}

function ghostY() {
  let gy = piece.y;
  while (valid(piece.shape, piece.x, gy + 1)) gy++;
  return gy;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawCell(board[r][c], c, r, SZ, ctx);

  if (piece && gameRunning) {
    const gy = ghostY();
    for (let r = 0; r < piece.shape.length; r++)
      for (let c = 0; c < piece.shape[r].length; c++)
        if (piece.shape[r][c] && gy !== piece.y) {
          ctx.fillStyle = 'rgba(120,120,120,0.25)';
          ctx.fillRect((piece.x + c) * SZ + 1, (gy + r) * SZ + 1, SZ - 2, SZ - 2);
        }
    for (let r = 0; r < piece.shape.length; r++)
      for (let c = 0; c < piece.shape[r].length; c++)
        if (piece.shape[r][c]) drawCell(piece.color, piece.x + c, piece.y + r, SZ, ctx);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
    ctx.fillStyle = '#fff';
    ctx.font = '500 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('게임 오버', canvas.width / 2, canvas.height / 2 - 10);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('점수: ' + score, canvas.width / 2, canvas.height / 2 + 16);
  }
}

function drawNext() {
  nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!next) return;
  const sz = 16;
  const ox = Math.floor((nextCanvas.width - next.shape[0].length * sz) / 2);
  const oy = Math.floor((nextCanvas.height - next.shape.length * sz) / 2);
  for (let r = 0; r < next.shape.length; r++)
    for (let c = 0; c < next.shape[r].length; c++)
      if (next.shape[r][c]) {
        nctx.fillStyle = next.color;
        nctx.fillRect(ox + c * sz + 1, oy + r * sz + 1, sz - 2, sz - 2);
      }
}

let lastTime = 0;
function loop(ts) {
  if (!gameRunning) return;
  if (ts - lastTime > dropInterval) { drop(); lastTime = ts; }
  draw();
  animId = requestAnimationFrame(loop);
}

function startGame() {
  if (animId) cancelAnimationFrame(animId);
  board = newBoard();
  score = 0; level = 1; lines = 0;
  dropInterval = 1000;
  gameRunning = true; gameOver = false;
  document.getElementById('score').textContent = 0;
  document.getElementById('level').textContent = 1;
  document.getElementById('lines').textContent = 0;
  document.getElementById('msg').textContent = '진행 중...';
  document.getElementById('btn').textContent = '재시작';
  piece = randomPiece();
  next = randomPiece();
  drawNext();
  lastTime = 0;
  animId = requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false; gameOver = true;
  draw();
  document.getElementById('msg').textContent = '다시 해볼까요?';
  document.getElementById('btn').textContent = '다시 시작';
}

document.getElementById('btn').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft') { if (valid(piece.shape, piece.x - 1, piece.y)) piece.x--; }
  else if (e.key === 'ArrowRight') { if (valid(piece.shape, piece.x + 1, piece.y)) piece.x++; }
  else if (e.key === 'ArrowDown') { drop(); lastTime = performance.now(); }
  else if (e.key === 'ArrowUp') {
    const r = rotate(piece.shape);
    if (valid(r, piece.x, piece.y)) piece.shape = r;
    else if (valid(r, piece.x - 1, piece.y)) { piece.shape = r; piece.x--; }
    else if (valid(r, piece.x + 1, piece.y)) { piece.shape = r; piece.x++; }
  }
  else if (e.key === ' ') { e.preventDefault(); hardDrop(); }
});

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchend', e => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && valid(piece.shape, piece.x + 1, piece.y)) piece.x++;
    else if (dx < -20 && valid(piece.shape, piece.x - 1, piece.y)) piece.x--;
  } else {
    if (dy > 20) hardDrop();
    else if (dy < -20) {
      const r = rotate(piece.shape);
      if (valid(r, piece.x, piece.y)) piece.shape = r;
      else if (valid(r, piece.x - 1, piece.y)) { piece.shape = r; piece.x--; }
      else if (valid(r, piece.x + 1, piece.y)) { piece.shape = r; piece.x++; }
    }
  }
  e.preventDefault();
}, {passive: false});
</script>
